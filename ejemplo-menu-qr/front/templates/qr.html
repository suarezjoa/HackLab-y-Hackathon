<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Truck — Escaneá el menú</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #f5f5f5;
           margin: 0; min-height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center; padding: 2rem 1rem; }
    h1 { font-size: 2rem; margin-bottom: .25rem; }
    .sub { color: #ffb703; margin-bottom: 2rem; }
    .qr { background: #fff; padding: 1.5rem; border-radius: 16px; }
    .qr svg { width: 260px; height: 260px; display: block; }
    .url { margin-top: 1.5rem; color: #888; font-size: .9rem; }
    code { color: #ffd; }
  </style>
</head>
<body>
  <h1>🍔 Food Truck</h1>
  <p class="sub">Escaneá para ver el menú</p>
  <div class="qr">{{ svg | safe }}</div>
  <p class="url">apunta a <code>{{ url }}</code></p>
</body>
</html>
