<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Menú del food truck</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a;
           margin: 0; padding: 2rem 1rem; }
    .cont { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
    th, td { text-align: left; padding: .6rem .4rem; border-bottom: 1px solid #ddd; }
    .off { color: #aaa; text-decoration: line-through; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: .4rem .7rem;
             font-size: .85rem; }
    .toggle { background: #e9ecef; }
    .del { background: #ffd6d6; }
    form.alta { display: flex; gap: .5rem; flex-wrap: wrap; }
    form.alta input { padding: .5rem; border: 1px solid #ccc; border-radius: 6px; }
    form.alta input[name=nombre] { flex: 1; min-width: 160px; }
    .add { background: #ffb703; font-weight: 700; }
    .inline { display: inline; }
    .error { background: #ffe3e3; border: 1px solid #f5a; border-radius: 8px;
             padding: 1rem; margin-bottom: 2rem; }
    code { background: #eee; padding: .1rem .3rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="cont">
    <h1>⚙️ Editar menú</h1>

    {% if error %}
      <div class="error">
        ⚠️ No pude conectar con la API (<code>{{ error }}</code>).
        Revisá que el servicio <b>app</b> esté arriba y que llegue a Cloud SQL.
      </div>
    {% else %}
      <table>
        <tr><th>Plato</th><th>Precio</th><th>Estado</th><th></th></tr>
        {% for plato in platos %}
          <tr>
            <td class="{{ '' if plato.disponible else 'off' }}">{{ plato.nombre }}</td>
            <td>${{ plato.precio }}</td>
            <td>
              <form class="inline" method="post" action="/admin/estado/{{ plato.id }}">
                <button class="toggle">{{ 'Ocultar' if plato.disponible else 'Mostrar' }}</button>
              </form>
            </td>
            <td>
              <form class="inline" method="post" action="/admin/borrar/{{ plato.id }}">
                <button class="del">Borrar</button>
              </form>
            </td>
          </tr>
        {% endfor %}
      </table>

      <form class="alta" method="post" action="/admin/agregar">
        <input name="nombre" placeholder="Nombre del plato" required>
        <input name="precio" type="number" placeholder="Precio" required>
        <button class="add">Agregar</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
